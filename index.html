<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Road Game with Rivers</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #87CEEB; /* Sky blue */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const laneHeight = 100;
    const roadWidth = canvas.width;
    let scrollOffset = 0;

    // Configuration for lanes
    const laneTypes = ["road", "river"]; // Two types of lanes
    const totalLanes = 15; // Number of lanes to display
    const laneSequence = Array.from({ length: totalLanes }, (_, i) =>
        laneTypes[Math.floor(Math.random() * laneTypes.length)]
    );

    function drawLanes() {
        for (let i = 0; i < canvas.height / laneHeight + 2; i++) {
            const laneY = (i * laneHeight) - (scrollOffset % laneHeight);
            const laneType = laneSequence[i % totalLanes]; // Cycle through lane types

            if (laneType === "road") {
                // Draw road
                ctx.fillStyle = (i % 2 === 0) ? "#444" : "#555"; // Alternating road colors
                ctx.fillRect(0, laneY, roadWidth, laneHeight);

                // Draw lane dividers
                if (i % 2 === 0) {
                    ctx.strokeStyle = "#FFF";
                    ctx.lineWidth = 4;
                    for (let j = 0; j < roadWidth / 50; j++) {
                        ctx.beginPath();
                        ctx.moveTo(j * 60 + 20, laneY + laneHeight / 2);
                        ctx.lineTo(j * 60 + 40, laneY + laneHeight / 2);
                        ctx.stroke();
                    }
                }
            } else if (laneType === "river") {
                // Draw river
                ctx.fillStyle = "#1E90FF"; // Water blue
                ctx.fillRect(0, laneY, roadWidth, laneHeight);

                // Draw waves (simple arcs)
                ctx.strokeStyle = "#87CEFA"; // Lighter blue for waves
                ctx.lineWidth = 2;
                for (let j = 0; j < roadWidth / 50; j++) {
                    ctx.beginPath();
                    ctx.arc(j * 60 + 30, laneY + laneHeight / 2, 10, 0, Math.PI);
                    ctx.stroke();
                }
            }
        }
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Scroll the road and river
        scrollOffset += 2;

        // Draw lanes
        drawLanes();

        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
