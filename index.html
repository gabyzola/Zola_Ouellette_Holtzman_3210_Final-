<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crossy Road Scene</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/110/three.min.js"></script>
<script>
  // Scene, Camera, and Renderer
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Camera position
  camera.position.set(0, 10, 100);
  camera.lookAt(0, 0, 0); 

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
  directionalLight.position.set(100, 200, 100);
  directionalLight.castShadow = true;
  scene.add(directionalLight);

  const laneWidth = 20; 
  const numLanes = 10; 

  // Calculate lane depth to fill screen width
  function getLaneDepth() {
    const frustumHeight = 2 * Math.tan((camera.fov * Math.PI) / 360) * Math.abs(camera.position.z - 0);
    const frustumWidth = frustumHeight * camera.aspect;
    return frustumWidth;
  }

  // Materials
  const roadMaterial = new THREE.MeshPhongMaterial({ color: 0x333333 });
  const grassMaterial = new THREE.MeshPhongMaterial({ color: 0x4caf50 });

  // Create a lane (either road or grass)
  function createLane(type, yPosition, laneDepth) {
    const material = type === 'road' ? roadMaterial : grassMaterial;
    const geometry = new THREE.BoxGeometry(laneDepth, laneWidth, 2);
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(0, yPosition, 0);
    mesh.receiveShadow = true;
    return mesh;
  }

  // Generate lanes
  function generateLanes() {
    const laneDepth = getLaneDepth();
    let yPosition = 0; 
    for (let i = 0; i < numLanes; i++) {
      const type = i % 2 === 0 ? 'road' : 'grass'; 
      const lane = createLane(type, yPosition, laneDepth);
      scene.add(lane);
      yPosition -= laneWidth; 
    }
  }

  generateLanes();

  // Render loop
  function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
  }

  animate();

  // Handle window resizing
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();

    // Regenerate lanes to fit screen
    scene.clear();
    scene.add(ambientLight);
    scene.add(directionalLight);
    generateLanes();
  });
</script>
</body>
</html>
