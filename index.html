<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Road and Grass with Flowers</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #87CEEB; /* Sky blue */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const laneHeight = 100;
    const roadWidth = canvas.width;
    const scrollSpeed = 0.5; // Slow scroll speed for smoothness
    let scrollOffset = 0;

    // Lane sequence: alternating between roads and grass
    const laneSequence = ["road", "grass", "road", "grass", "road", "grass"];
    const totalLanes = laneSequence.length;

    // Function to draw flowers on the grass lanes
    function drawFlowers(laneY) {
        const flowerCount = 5; // Number of flowers per grass lane
        for (let i = 0; i < flowerCount; i++) {
            const flowerX = Math.random() * roadWidth; // Random X position within the lane width
            const flowerY = laneY + Math.random() * (laneHeight - 20) + 10; // Random Y position within the grass lane

            // Draw flower (simple circle for illustration)
            ctx.fillStyle = "#FFD700"; // Yellow color for flower
            ctx.beginPath();
            ctx.arc(flowerX, flowerY, 10, 0, Math.PI * 2); // Simple flower shape
            ctx.fill();
        }
    }

    // Function to draw lanes at a specific offset
    function drawLanes() {
        const visibleLanes = Math.ceil(canvas.height / laneHeight) + 2;

        for (let i = 0; i < visibleLanes; i++) {
            const laneY = (i * laneHeight) - (scrollOffset % laneHeight);
            const laneType = laneSequence[i % totalLanes];

            if (laneType === "road") {
                // Draw road
                ctx.fillStyle = "#444";
                ctx.fillRect(0, laneY, roadWidth, laneHeight);

                // Draw lane dividers (simple dashed lines for the road)
                ctx.strokeStyle = "#FFF";
                ctx.lineWidth = 4;
                for (let j = 0; j < roadWidth / 60; j++) {
                    ctx.beginPath();
                    ctx.moveTo(j * 80 + 20, laneY + laneHeight / 2);
                    ctx.lineTo(j * 80 + 50, laneY + laneHeight / 2);
                    ctx.stroke();
                }
            } else if (laneType === "grass") {
                // Draw grass
                ctx.fillStyle = "#228B22"; // Green color for grass
                ctx.fillRect(0, laneY, roadWidth, laneHeight);

                // Draw stationary flowers on the grass lane
                drawFlowers(laneY);
            }
        }
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Increment scroll offset gradually by the scroll speed
        scrollOffset += scrollSpeed;

        // Once a lane moves off the screen, reset it to the top to create a smooth loop
        if (scrollOffset >= laneHeight) {
            scrollOffset = 0;
        }

        // Draw all lanes
        drawLanes();

        // Request the next frame
        requestAnimationFrame(gameLoop);
    }

    // Start the game loop
    gameLoop();
</script>
</body>
</html>
