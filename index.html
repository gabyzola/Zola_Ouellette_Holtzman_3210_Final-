<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Road and Grass with Flowers</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Function to resize the canvas to fill the screen
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    // Resize the canvas when the window is resized
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); 

    const laneHeight = 100;
    const roadWidth = canvas.width;
    const scrollSpeed = 0.5; 

    // Lane sequence: alternating between roads and grass
    const laneSequence = ["road", "grass", "road", "grass", "road", "grass"];
    const totalLanes = laneSequence.length;

    let lanes = [];

    // Initialize the lanes off-screen
    function initializeLanes() {
        lanes = [];
        const visibleLanes = Math.ceil(canvas.height / laneHeight) + 2;

        for (let i = 0; i < visibleLanes; i++) {
            lanes.push({
                y: i * laneHeight,  
                type: laneSequence[i % totalLanes], 
            });
        }
    }

    // Function to draw flowers on the grass lanes
    function drawFlowers(laneY) {
        const flowerCount = 2;
        for (let i = 0; i < flowerCount; i++) {
            const flowerX = Math.random() * roadWidth; 
            const flowerY = laneY + Math.random() * (laneHeight - 20) + 10;

            // Draw flower
            ctx.fillStyle = "magenta";
            ctx.beginPath();
            ctx.arc(flowerX, flowerY, 10, 0, Math.PI * 2); 
            ctx.fill();
        }
    }

    // Function to draw lanes at a specific offset
    function drawLanes() {
        for (let i = 0; i < lanes.length; i++) {
            const lane = lanes[i];

            // Draw the lane based on its type
            if (lane.type === "road") {
                // Draw road
                ctx.fillStyle = "#444";
                ctx.fillRect(0, lane.y, roadWidth, laneHeight);

                // Draw lane dividers (simple dashed lines for the road)
                ctx.strokeStyle = "#FFF";
                ctx.lineWidth = 4;
                for (let j = 0; j < roadWidth / 60; j++) {
                    ctx.beginPath();
                    ctx.moveTo(j * 80 + 20, lane.y + laneHeight / 2);
                    ctx.lineTo(j * 80 + 50, lane.y + laneHeight / 2);
                    ctx.stroke();
                }
            } else if (lane.type === "grass") {
                // Draw grass
                ctx.fillStyle = "green"; 
                ctx.fillRect(0, lane.y, roadWidth, laneHeight);

                // Draw flowers on the grass lane
                drawFlowers(lane.y);
            }
        }
    }

    // Update the lanes' positions and reset their position when they go off-screen
    function updateLanes() {
        for (let i = 0; i < lanes.length; i++) {
            const lane = lanes[i];
            lane.y += scrollSpeed;

            // Once a lane goes off the screen, reset it to the top
            if (lane.y >= canvas.height) {
                lane.y = -laneHeight;  
                lane.type = laneSequence[Math.floor(Math.random() * totalLanes)]; 
            }
        }
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Update and draw lanes
        updateLanes();
        drawLanes();

        // Request the next frame
        requestAnimationFrame(gameLoop);
    }

    // Initialize the lanes and start the game loop
    initializeLanes();
    gameLoop();
</script>
</body>
</html>
