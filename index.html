<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Horizontal Roads</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer;
        const roads = [];
        const laneWidth = 20;  
        const roadLength = 200; 
        const numRows = 4; 
        const numLanes = 10; 
        const scrollSpeed = 0.2; 

        // Initialize the scene, camera, and renderer
        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 100); 
            camera.lookAt(0, 10, 0); 

            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // ambient light to illuminate the scene
            const light = new THREE.AmbientLight(0x888888);
            scene.add(light);

            // Add a directional light to help illuminate the scene and cast shadows
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(0, 10, 10).normalize();
            scene.add(dirLight);

            // the rows of roads and add them to the scene
            createInitialRoads();

            window.addEventListener('resize', onWindowResize, false);

            animate();
        }

        // Create initial roads immediately in front of the camera
        function createInitialRoads() {
            for (let row = 0; row < numRows; row++) {
                for (let col = 0; col < numLanes; col++) {
                    const road = createRoad(row * roadLength, col * laneWidth);
                    roads.push(road);
                    scene.add(road);
                }
            }
        }

        // Create a road segment
        function createRoad(zPosition, xPosition) {
            const roadGeometry = new THREE.PlaneGeometry(laneWidth, roadLength);
            const roadMaterial = new THREE.MeshLambertMaterial({ color: 0x888888, side: THREE.DoubleSide });
            const road = new THREE.Mesh(roadGeometry, roadMaterial);
            road.position.set(xPosition, 0, zPosition);
            road.rotation.x = -Math.PI / 2; 
            return road;
        }

        // Resize canvas on window resize
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Update the positions of the roads to simulate movement
        function updateRoads() {
            for (let i = 0; i < roads.length; i++) {
                const road = roads[i];
                road.position.z += scrollSpeed;

                // Recycle road when it moves off-screen
                if (road.position.z > roadLength * numRows) {
                    road.position.z = -roadLength * numRows;  
                }
            }
        }

        // Animate the scene
        function animate() {
            requestAnimationFrame(animate);

            // Update road positions to simulate infinite scrolling
            updateRoads();

            // Render the scene (camera stays fixed)
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
