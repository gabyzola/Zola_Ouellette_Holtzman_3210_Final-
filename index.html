<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Road Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #87CEEB; 
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const laneHeight = 100;
    const roadWidth = canvas.width;
    const scrollSpeed = 1;
    let scrollOffset = 0;

    // Fixed lane order for smooth transitions
    const laneSequence = ["road", "river", "grass", "road", "grass", "river"]; 
    const totalLanes = laneSequence.length; 

    function drawLanes() {
        
        const visibleLanes = Math.ceil(canvas.height / laneHeight) + 2;

        for (let i = 0; i < visibleLanes; i++) {
            const laneY = (i * laneHeight) - (scrollOffset % laneHeight);
            const laneType = laneSequence[i % totalLanes]; 

            if (laneType === "road") {
                // Draw road
                ctx.fillStyle = "#444"; 
                ctx.fillRect(0, laneY, roadWidth, laneHeight);

                // Draw lane dividers
                ctx.strokeStyle = "#FFF";
                ctx.lineWidth = 4;
                for (let j = 0; j < roadWidth / 60; j++) {
                    ctx.beginPath();
                    ctx.moveTo(j * 80 + 20, laneY + laneHeight / 2);
                    ctx.lineTo(j * 80 + 50, laneY + laneHeight / 2);
                    ctx.stroke();
                }
            } else if (laneType === "river") {
                // Draw river
                ctx.fillStyle = "#1E90FF"; // Water blue
                ctx.fillRect(0, laneY, roadWidth, laneHeight);

                // Draw stones
                for (let j = 0; j < roadWidth / 150; j++) {
                    ctx.fillStyle = "#D3D3D3"; 
                    const stoneX = j * 150 + 50; 
                    const stoneY = laneY + laneHeight / 2;
                    ctx.beginPath();
                    ctx.arc(stoneX, stoneY, 10, 0, Math.PI * 2); 
                    ctx.fill();
                }
            } else if (laneType === "grass") {
                // Draw grass
                ctx.fillStyle = "#228B22"; 
                ctx.fillRect(0, laneY, roadWidth, laneHeight);

            }
        }
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Increment scroll offset by the scroll speed
        scrollOffset += scrollSpeed;

        // Draw all lanes
        drawLanes();

        // Request the next frame
        requestAnimationFrame(gameLoop);
    }

    // Start the game loop
    gameLoop();
</script>
</body>
</html>
